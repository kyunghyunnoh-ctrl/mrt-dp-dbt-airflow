<html lang="ko">

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--g8);line-height:1.75;-webkit-font-smoothing:antialiased}
.wrap{width:100%;max-width:960px;margin:0 auto;background:var(--white);min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,.08);display:flex;flex-direction:column}

.hd-in{position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:4px 12px;margin-bottom:10px}
.bdot{width:7px;height:7px;border-radius:50%;background:#FF3B30;animation:pulse 1.5s infinite;flex-shrink:0}

.hsub{font-size:13px;color:rgba(255,255,255,.5)}
.sbar{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--g2);position:sticky;top:0;z-index:200}
.sinput{width:100%;padding:9px 14px;border:1.5px solid var(--g2);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.sinput:focus{border-color:var(--blue)}
.rgbox{padding:10px 16px;background:#FAFAFA;border-bottom:1px solid var(--g1)}
.rglbl{font-size:11px;font-weight:700;color:var(--g4);letter-spacing:.05em;margin-bottom:6px}
.rgrow{display:flex;flex-wrap:wrap;gap:5px}
.rgtag{padding:4px 11px;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;font-weight:600;color:var(--g6);background:var(--white);cursor:pointer;font-family:inherit;transition:all .15s}
.rgtag:hover{border-color:var(--blue);color:var(--blue);background:var(--b50)}
.rgtag.on{border-color:var(--blue);color:#fff;background:var(--blue)}
.pills{padding:8px 16px;background:#fff;border-bottom:1px solid var(--g1);display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 11px;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;font-weight:600;color:var(--g6);background:var(--white);cursor:pointer;transition:all .15s;font-family:inherit}
.pill:hover{border-color:var(--blue);color:var(--blue);background:var(--b50)}
.pill.on{border-color:var(--blue);color:#fff;background:var(--blue)}
.content{flex:1}
.csec{display:none}
.csec.on{display:block;animation:fu .22s ease}

.chead .sub{font-size:13px;color:var(--g6);margin-top:2px}
.sec{padding:0 24px;margin-bottom:22px}
.stitle{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.card{background:var(--white);border-radius:var(--r);padding:18px;border:1px solid var(--g2)}
.cl{list-style:none;display:flex;flex-direction:column;gap:1px}
.cl li{padding:0}
.clbl{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:background .15s}
.clbl:hover{background:var(--g1)}

.cbox{flex-shrink:0;width:20px;height:20px;margin-top:1px;border:2px solid var(--g2);border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s}

.clbl input:checked~.cbox{background:var(--blue);border-color:var(--blue)}
.clbl input:checked~.cbox svg{opacity:1;transform:scale(1)}
.clbl input:checked~.ctxt{color:var(--g4);text-decoration:line-through}
.ctxt{font-size:14px;color:var(--g6);line-height:1.6;transition:color .2s}

.pgtop{display:flex;justify-content:space-between;margin-bottom:5px}

.co-w{background:var(--r50);border-left:3px solid var(--red);color:#991B1B}
.co-t{background:var(--a50);border-left:3px solid var(--amber);color:#92400E}
.co-i{background:var(--b50);border-left:3px solid var(--blue);color:#1E40AF}

.bpad{height:36px}
.nores{padding:50px 24px;text-align:center;color:var(--g4);font-size:14px;display:none}

 tip:"카이로 운전은 세계 최고 카오스 중 하나! 경적이 대화 수단이에요. 기사가 포함된 렌터카를 처음엔 강력 추천해요."},
{rg:"이집트·북아프리카",city:"마라케시",flag:"🇲🇦",
 cl:["차량 외관 360° 사진·영상 촬영","국제면허증 소지 확인 ⚠️","연료 종류 확인 ⚠️","도난보험 가입 확인","GPS 정상 작동 확인","비상연락처 저장"],
 up:[{n:"GPS 내비게이션",i:"모로코 도로 필수"},{n:"풀커버 보험",i:"도난+사고 면책"},{n:"추가 운전자 등록",i:"사하라 교대"},{n:"4WD",i:"사하라 사막 드라이브"}],
 sp:[{c:"lm",n:"와르자자트",d:"영화 촬영지 & 사막 관문 (편도 4h)"},{c:"lm",n:"오트 아틀라스",d:"아틀라스 산맥 드라이브"},{c:"lm",n:"에사우이라",d:"해안 파란 마을 (편도 3h)"},{c:"fd",n:"Dar Yacout",d:"마라케시 파인 다이닝"},{c:"fd",n:"Djemaa el-Fna",d:"마라케시 야시장 광장"}],
 tip:"마라케시~메르주가 사하라 사막 드라이브는 모로코 최고 드라이브 코스! 3박 4일 일정으로 아틀라스 산맥을 넘어 사막까지 달려보세요."}
];
/* ── 렌더 헬퍼 ── */
const REGIONS=[...new Set(DATA.map(d=>d.rg))];
let activeRg=REGIONS[0];
let activeCity=DATA[0].city;
const activeEC={};
function stepsHTML(arr,ac){
  return arr.map((s,i)=>{
    const last=i===arr.length-1;
    const line=last?'':`<div class="sline" style="background:${ac}25;"></div>`;
    const note=s.note?`<div class="stnote${s.nt==='w'?' w':s.nt==='d'?' d':''}">${s.note}</div>`:'';
    return `<div class="srow"><div class="sleft"><div class="snum" style="background:${ac};box-shadow:0 3px 8px ${ac}40;">${s.n}</div>${line}</div>
      <div class="scont${last?' last':''}"><div class="stname">${s.t}</div><div class="stdesc">${s.d}</div>${note}</div></div>`;
  }).join('');
}
function ecHTML(id){
  const e=EC[id];let body='';
  if(e.steps){body=`<div class="slbl">대응 순서</div>${stepsHTML(e.steps,e.ac)}`;}
  else{body=e.subs.map((sec,si)=>{
    const div=si<e.subs.length-1?'<div class="sdiv2"></div>':'';
    return `<div class="ssub" style="background:#fff;color:${e.ac};border:1px solid ${e.ac}44;">${sec.lb}</div>${stepsHTML(sec.steps,e.ac)}${div}`;
  }).join('');}
  return `<div class="ccase" style="border-color:${e.ac}33;">
    <div class="cbadge" style="background:${e.tb};border:1px solid ${e.ac}44;"><span class="cdot" style="background:${e.ac};"></span><span class="cbtxt" style="color:${e.ac};">${e.tag} 케이스</span></div>
    <div class="ctitle2">${e.title}</div><div class="csub2">${e.sub}</div></div>${body}
  <div class="cta"><div><div class="cta-t">마이리얼트립 고객센터</div><div class="cta-s">해결이 어렵다면 바로 문의하세요</div></div><button class="cta-b">1:1 문의 →</button></div>`;
}
function switchEC(sid,eid){
  activeEC[sid]=eid;
  const sec=document.getElementById(sid);
  sec.querySelectorAll('.etab').forEach(b=>{
    const bid=b.dataset.id,e=EC[bid];
    const lb=b.querySelector('.etab-lb'),ind=b.querySelector('.etab-in');
    if(bid===eid){lb.style.color=e.ac;lb.style.fontWeight='700';ind.style.display='block';}
    else{lb.style.color='#999';lb.style.fontWeight='500';ind.style.display='none';}
  });
  sec.querySelector('.econtent').innerHTML=ecHTML(eid);
}
function mkId(city){return 's_'+city.replace(/[^가-힣a-zA-Z0-9]/g,'_');}
function buildSection(d,isFirst){
  const id=mkId(d.city);
  const cl=d.cl.map((item,i)=>`<li><label class="clbl" for="c${id}${i}">
    <input type="checkbox" id="c${id}${i}" onchange="updPg('${id}',${d.cl.length})">
    <span class="cbox"><svg viewBox="0 0 12 10"><polyline points="1.5,5 4.5,8 10.5,1.5"/></svg></span>
    <span class="ctxt">${item}</span></label></li>`).join('');
  const spots=d.sp.map(s=>`<div class="spot"><div class="scat ${s.c}">${s.c==='lm'?'🏛 랜드마크':'🍽 맛집'}</div>
    <div class="sname">${s.n}</div><div class="sdesc">${s.d}</div></div>`).join('');
  const utags=d.up.map(u=>`<span class="utag">${u.n}</span>`).join('');
  const udets=d.up.map(u=>`<p><strong>${u.n}</strong> — ${u.i}</p>`).join('');
  const etabs=[{id:'acc',ic:'🚨',lb:'사고',c:'#FF3B30'},{id:'ri',ic:'🚗',lb:'대여 이슈',c:'#FF9500'},{id:'dl',ic:'⏰',lb:'픽업 지연',c:'#007AFF'}]
    .map(t=>`<button class="etab" data-id="${t.id}" onclick="switchEC('${id}','${t.id}')">
      <span class="etab-ic">${t.ic}</span><span class="etab-lb">${t.lb}</span>
      <div class="etab-in" style="background:${t.c};"></div></button>`).join('');
  const tip=d.tip?`<div class="tip-box">💡 <strong>현지 꿀팁:</strong> ${d.tip}</div>`:'';
  return `<div class="csec${isFirst?' on':''}" id="${id}" data-city="${d.city}" data-rg="${d.rg}">
    <div class="chead"><h2>${d.flag} ${d.city}</h2><div class="sub">${d.rg} · 인수 당일 가이드</div></div>
    <div class="sec"><div class="stitle"><span>✅</span> 차량 인수 체크리스트</div>
      <div class="card"><p style="margin-bottom:12px;font-weight:600;color:var(--dark);">하나라도 빼먹으면 반납 시 억울한 비용이 생길 수 있어요!</p>
        ${tip}<div class="pgwrap"><div class="pgtop"><span class="pglbl">완료 항목</span><span class="pgcnt" id="pc${id}">0 / ${d.cl.length}</span></div>
        <div class="pgbg"><div class="pgbar" id="pb${id}" style="width:0%"></div></div></div>
        <ul class="cl">${cl}</ul>
        <div class="done-badge" id="db${id}">✅ 모든 항목 완료! 안전한 드라이브 되세요 🚗</div>
        <div class="co co-w" style="margin-top:10px;"><strong>📸 가장 중요한 한 가지!</strong> 차량 인수 전 반드시 외관 360° 사진/영상을 촬영하세요.</div>
      </div></div>
    <div class="sec"><div class="stitle"><span>🛒</span> 현장에서 권유받을 수 있는 옵션들</div>
      <div class="card"><p style="margin-bottom:10px;color:var(--g6);">인수 시 직원이 아래 옵션을 추가로 권유할 수 있어요.</p>
        <div class="utags">${utags}</div><div class="udets" style="margin-top:12px;">${udets}</div>
        <div class="co co-t"><strong>💡 꿀팁:</strong> 풀커버 보험과 GPS는 해외 렌터카에서 거의 필수예요. 가능하면 예약 시 미리 추가하는 게 저렴합니다.</div>
      </div></div>
    <div class="sec"><div class="stitle"><span>🗺️</span> ${d.city} 드라이브 스팟 & 맛집</div>
      <div class="card"><p style="margin-bottom:12px;color:var(--g6);">렌트카로 가기 좋은 핵심 스팟을 골랐어요.</p>
        <div class="sgrid">${spots}</div></div></div>
    <div class="divider"></div>
    <div class="ezone">
      <div class="ehd"><div class="edot"></div><span class="etxt">긴급 대응 가이드</span></div>
      <div class="etitle">여행 중 문제가 생겼나요?</div>
      <div class="esub">아래 케이스를 선택하면 대응 방법을 안내해드려요</div>
      <div class="etabs">${etabs}</div>
      <div class="econtent">${ecHTML('acc')}</div>
      <div class="bpad"></div>
    </div></div>`;
}
/* ── 초기화 ── */
const rgrow=document.getElementById('rgrow');
const pills=document.getElementById('pills');
const content=document.getElementById('content');
content.innerHTML=DATA.map((d,i)=>buildSection(d,i===0)).join('');
switchEC(mkId(DATA[0].city),'acc');
function renderRgBtns(){
  rgrow.innerHTML=REGIONS.map(rg=>`<button class="rgtag${rg===activeRg?' on':''}" onclick="selectRg('${rg}')">${rg}</button>`).join('');
}
function renderPills(rg){
  const cities=DATA.filter(d=>d.rg===rg);
  pills.innerHTML=cities.map(d=>`<button class="pill${d.city===activeCity&&d.rg===rg?' on':''}" onclick="showCity('${d.city}')">${d.flag} ${d.city}</button>`).join('');
}
function selectRg(rg){
  activeRg=rg;renderRgBtns();renderPills(rg);
  const first=DATA.find(d=>d.rg===rg);
  if(first)showCity(first.city);
}
function showCity(city){
  activeCity=city;
  document.querySelectorAll('.csec').forEach(s=>s.classList.remove('on'));
  const id=mkId(city);
  const sec=document.getElementById(id);
  if(sec){sec.classList.add('on');if(!activeEC[id])switchEC(id,'acc');}
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.textContent.includes(city)));
  document.getElementById('si').value='';
  document.getElementById('nores').style.display='none';
}
function doFilter(v){
  const q=v.trim().toLowerCase();
  const nores=document.getElementById('nores');
  if(!q){nores.style.display='none';renderPills(activeRg);showCity(DATA.find(d=>d.rg===activeRg)?.city||DATA[0].city);return;}
  const matches=DATA.filter(d=>d.city.toLowerCase().includes(q)||d.rg.toLowerCase().includes(q));
  nores.style.display=matches.length?'none':'block';
  pills.innerHTML=matches.map(d=>`<button class="pill" onclick="showCity('${d.city}')">${d.flag} ${d.city}</button>`).join('');
  if(matches.length)showCity(matches[0].city);
}
function updPg(id,total){
  const sec=document.getElementById(id);if(!sec)return;
  const checked=sec.querySelectorAll('input[type=checkbox]:checked').length;
  document.getElementById('pc'+id).textContent=checked+' / '+total;
  document.getElementById('pb'+id).style.width=Math.round(checked/total*100)+'%';
  const db=document.getElementById('db'+id);if(db)db.classList.toggle('show',checked===total);
}
renderRgBtns();renderPills(activeRg);
</script>
</body>
</html>
