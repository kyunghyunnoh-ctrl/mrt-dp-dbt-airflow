<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>여행 중 가이드 — 유럽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--white:#FFF;--dark:#111827;--g8:#1F2937;--g6:#4B5563;--g4:#9CA3AF;--g2:#E5E7EB;--g1:#F3F4F6;--blue:#2563EB;--b50:#EFF6FF;--orange:#EA580C;--red:#DC2626;--r50:#FEF2F2;--green:#059669;--gr50:#ECFDF5;--amber:#D97706;--a50:#FFFBEB;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--g8);line-height:1.75;-webkit-font-smoothing:antialiased}
.wrap{width:100%;max-width:960px;margin:0 auto;background:var(--white);min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,.08);display:flex;flex-direction:column}
.hd{background:linear-gradient(135deg,#0F172A,#1E3A5F);padding:36px 24px 24px;color:#fff;position:relative;overflow:hidden}
.hd::after{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(37,99,235,.2),transparent 70%);border-radius:50%}
.hd-in{position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:4px 12px;margin-bottom:10px}
.bdot{width:7px;height:7px;border-radius:50%;background:#FF3B30;animation:pulse 1.5s infinite;flex-shrink:0}
.blbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.06em}
.htitle{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.03em;margin-bottom:4px}
.hsub{font-size:13px;color:rgba(255,255,255,.5)}
.sbar{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--g2);position:sticky;top:0;z-index:200}
.sinput{width:100%;padding:9px 14px;border:1.5px solid var(--g2);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.sinput:focus{border-color:var(--blue)}
.rgbox{padding:10px 16px;background:#FAFAFA;border-bottom:1px solid var(--g1)}
.rglbl{font-size:11px;font-weight:700;color:var(--g4);letter-spacing:.05em;margin-bottom:6px}
.rgrow{display:flex;flex-wrap:wrap;gap:5px}
.rgtag{padding:4px 11px;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;font-weight:600;color:var(--g6);background:var(--white);cursor:pointer;font-family:inherit;transition:all .15s}
.rgtag:hover{border-color:var(--blue);color:var(--blue);background:var(--b50)}
.rgtag.on{border-color:var(--blue);color:#fff;background:var(--blue)}
.pills{padding:8px 16px;background:#fff;border-bottom:1px solid var(--g1);display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 11px;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;font-weight:600;color:var(--g6);background:var(--white);cursor:pointer;transition:all .15s;font-family:inherit}
.pill:hover{border-color:var(--blue);color:var(--blue);background:var(--b50)}
.pill.on{border-color:var(--blue);color:#fff;background:var(--blue)}
.content{flex:1}
.csec{display:none}
.csec.on{display:block;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chead{padding:22px 24px 0;margin-bottom:18px}
.chead h2{font-size:21px;font-weight:900;color:var(--dark);letter-spacing:-.03em}
.chead .sub{font-size:13px;color:var(--g6);margin-top:2px}
.sec{padding:0 24px;margin-bottom:22px}
.stitle{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.card{background:var(--white);border-radius:var(--r);padding:18px;border:1px solid var(--g2)}
.cl{list-style:none;display:flex;flex-direction:column;gap:1px}
.cl li{padding:0}
.clbl{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:background .15s}
.clbl:hover{background:var(--g1)}
.clbl input{display:none}
.cbox{flex-shrink:0;width:20px;height:20px;margin-top:1px;border:2px solid var(--g2);border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cbox svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:0;transform:scale(.5);transition:all .18s}
.clbl input:checked~.cbox{background:var(--blue);border-color:var(--blue)}
.clbl input:checked~.cbox svg{opacity:1;transform:scale(1)}
.clbl input:checked~.ctxt{color:var(--g4);text-decoration:line-through}
.ctxt{font-size:14px;color:var(--g6);line-height:1.6;transition:color .2s}
.pgwrap{margin-bottom:12px}
.pgtop{display:flex;justify-content:space-between;margin-bottom:5px}
.pglbl{font-size:12px;font-weight:600;color:var(--g6)}
.pgcnt{font-size:12px;font-weight:700;color:var(--blue)}
.pgbg{height:5px;background:var(--g1);border-radius:99px;overflow:hidden}
.pgbar{height:100%;background:var(--blue);border-radius:99px;transition:width .3s}
.done-badge{display:none;align-items:center;gap:5px;margin-top:8px;padding:9px 13px;background:var(--gr50);border-radius:9px;font-size:13px;font-weight:600;color:var(--green)}
.done-badge.show{display:flex}
.co{padding:12px 15px;border-radius:9px;font-size:13px;line-height:1.7;margin-top:10px}
.co-w{background:var(--r50);border-left:3px solid var(--red);color:#991B1B}
.co-t{background:var(--a50);border-left:3px solid var(--amber);color:#92400E}
.co-i{background:var(--b50);border-left:3px solid var(--blue);color:#1E40AF}
.utags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.utag{padding:4px 11px;background:var(--b50);color:var(--blue);border-radius:7px;font-size:12px;font-weight:600}
.udets{margin-top:12px}
.udets p{font-size:13px;color:var(--g6);margin-bottom:3px}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
@media(min-width:600px){.sgrid{grid-template-columns:repeat(3,1fr)}}
.spot{background:var(--g1);border-radius:9px;padding:11px 13px}
.scat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.scat.lm{color:var(--blue)}.scat.fd{color:var(--orange)}
.sname{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:1px}
.sdesc{font-size:11px;color:var(--g6)}
.divider{height:8px;background:var(--g1);margin-bottom:22px}
.ezone{background:#fff;border-top:1px solid var(--g2);padding-bottom:28px}
.ehd{padding:18px 24px 0;display:flex;align-items:center;gap:9px;margin-bottom:14px}
.edot{width:8px;height:8px;border-radius:50%;background:#FF3B30;animation:pulse 1.5s infinite}
.etxt{font-size:13px;font-weight:700;color:#FF3B30;letter-spacing:.05em}
.etitle{font-size:17px;font-weight:800;color:var(--dark);padding:0 24px;margin-bottom:3px;letter-spacing:-.03em}
.esub{font-size:13px;color:var(--g6);padding:0 24px;margin-bottom:18px}
.etabs{display:flex;border-bottom:1px solid var(--g2);overflow-x:auto;scrollbar-width:none;margin-bottom:18px}
.etabs::-webkit-scrollbar{display:none}
.etab{flex:1;min-width:80px;padding:9px 4px 11px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;font-family:inherit}
.etab-ic{font-size:19px}
.etab-lb{font-size:11px;font-weight:500;color:#999;white-space:nowrap;transition:all .2s}
.etab-in{position:absolute;bottom:0;left:10%;right:10%;height:2.5px;border-radius:2px 2px 0 0;display:none}
.econtent{padding:0 24px}
.ccase{border-radius:13px;padding:15px 17px;margin-bottom:14px;border:1.5px solid var(--g2)}
.cbadge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 9px;margin-bottom:7px}
.cdot{width:6px;height:6px;border-radius:50%}
.cbtxt{font-size:11px;font-weight:700;letter-spacing:.03em}
.ctitle2{font-size:15px;font-weight:800;color:var(--dark);letter-spacing:-.03em;margin-bottom:2px}
.csub2{font-size:13px;color:var(--g6)}
.slbl{font-size:11px;font-weight:700;color:#999;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.ssub{font-size:12px;font-weight:700;border-radius:7px;padding:4px 9px;margin-bottom:10px;display:inline-block}
.srow{display:flex;gap:13px}
.sleft{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:32px}
.snum{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.sline{width:2px;flex:1;min-height:16px;border-radius:2px;margin:3px 0}
.scont{flex:1;padding-bottom:15px}
.scont.last{padding-bottom:0}
.stname{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px;letter-spacing:-.02em}
.stdesc{font-size:12px;color:#555;line-height:1.6}
.stnote{margin-top:7px;background:#F0F6FF;border:1px solid #BFD7FF;border-radius:8px;padding:8px 11px;font-size:12px;color:#1D4E9B;font-weight:500;line-height:1.5}
.stnote.w{background:#FFF8EC;border-color:#FFE0A0;color:#B85C00}
.stnote.d{background:#FFF1F0;border-color:#FFCCC7;color:#CF1322}
.sdiv2{height:1px;background:#F0F0F0;margin:3px 0 14px}
.cta{margin-top:18px;background:#F5F5F7;border-radius:13px;padding:15px 17px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.cta-t{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:1px}
.cta-s{font-size:12px;color:#888}
.cta-b{background:var(--dark);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.cta-b:hover{background:#333}
.bpad{height:36px}
.nores{padding:50px 24px;text-align:center;color:var(--g4);font-size:14px;display:none}
.eu-tip{background:#EEF4FF;border:1px solid #BFD7FF;border-radius:10px;padding:12px 15px;margin-bottom:14px;font-size:13px;color:#1D4E9B;line-height:1.7}
.eu-tip strong{color:#1239A0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
</style>
</head>

{co:"아이슬란드",flag:"🇮🇸",city:"케플라비크",

 up:[{n:"4WD 업그레이드",i:"아이슬란드 F-Road 필수"},{n:"스노우타이어",i:"연중 필요 (특히 10~4월)"},{n:"GPS + 오프라인 지도",i:"신호 없는 고원 지대"},{n:"풀커버 보험",i:"모래·화산재·홍수 면책 확인"}],
 sp:[{c:"lm",n:"골든 서클",d:"게이시르·굴포스·씽벨리르"},{c:"lm",n:"링로드 (Route 1)",d:"아이슬란드 일주 드라이브"},{c:"lm",n:"블루 라군",d:"지열 온천 스파"},{c:"fd",n:"Dill Restaurant",d:"레이캬비크 미슐랭 레스토랑"},{c:"fd",n:"Kolaportið",d:"레이캬비크 전통 시장"}],

 sp:[{c:"lm",n:"스나이펠스네스 반도",d:"화산 & 해안 드라이브"},{c:"lm",n:"웨스트피요르드",d:"아이슬란드 최고 숨은 절경"},{c:"lm",n:"케리드 화산 호수",d:"붉은 화산 분화구 호수"},{c:"fd",n:"Grillið",d:"레이캬비크 파인 다이닝"},{c:"fd",n:"Hlemmur Mathöll",d:"레이캬비크 푸드홀"}],

{co:"아이슬란드",flag:"🇮🇸",city:"아퀴레이리",

 up:[{n:"4WD 업그레이드",i:"아이슬란드 북부 비포장"},{n:"스노우타이어",i:"아이슬란드 북부 겨울"},{n:"GPS + 오프라인 지도",i:"통신 불가 지역 대비"},{n:"풀커버 보험 (SAAP)",i:"모래·화산재·홍수 면책"}],

 tip:"아퀴레이리는 아이슬란드 북부 수도. 고다포스~미바튼~후사비크 드라이브 루트는 아이슬란드 북부 최고 코스!"}

/* ── 렌더 헬퍼 ── */
const COUNTRIES=[...new Set(DATA.map(d=>d.flag+' '+d.co))];
let activeCountry=DATA[0].co;
let activeCity=DATA[0].city;
const activeEC={};
function stepsHTML(arr,ac){
  return arr.map((s,i)=>{
    const last=i===arr.length-1;
    const line=last?'':`<div class="sline" style="background:${ac}25;"></div>`;
    const note=s.note?`<div class="stnote${s.nt==='w'?' w':s.nt==='d'?' d':''}">${s.note}</div>`:'';
    return `<div class="srow"><div class="sleft"><div class="snum" style="background:${ac};box-shadow:0 3px 8px ${ac}40;">${s.n}</div>${line}</div>
      <div class="scont${last?' last':''}"><div class="stname">${s.t}</div><div class="stdesc">${s.d}</div>${note}</div></div>`;
  }).join('');
}
function ecHTML(id){
  const e=EC[id];let body='';
  if(e.steps){body=`<div class="slbl">대응 순서</div>${stepsHTML(e.steps,e.ac)}`;}
  else{body=e.subs.map((sec,si)=>{
    const div=si<e.subs.length-1?'<div class="sdiv2"></div>':'';
    return `<div class="ssub" style="background:#fff;color:${e.ac};border:1px solid ${e.ac}44;">${sec.lb}</div>${stepsHTML(sec.steps,e.ac)}${div}`;
  }).join('');}
  return `<div class="ccase" style="border-color:${e.ac}33;">
    <div class="cbadge" style="background:${e.tb};border:1px solid ${e.ac}44;"><span class="cdot" style="background:${e.ac};"></span><span class="cbtxt" style="color:${e.ac};">${e.tag} 케이스</span></div>
    <div class="ctitle2">${e.title}</div><div class="csub2">${e.sub}</div></div>${body}
  <div class="cta"><div><div class="cta-t">마이리얼트립 고객센터</div><div class="cta-s">해결이 어렵다면 바로 문의하세요</div></div><button class="cta-b">1:1 문의 →</button></div>`;
}
function switchEC(sid,eid){
  activeEC[sid]=eid;
  const sec=document.getElementById(sid);
  sec.querySelectorAll('.etab').forEach(b=>{
    const bid=b.dataset.id,e=EC[bid];
    const lb=b.querySelector('.etab-lb'),ind=b.querySelector('.etab-in');
    if(bid===eid){lb.style.color=e.ac;lb.style.fontWeight='700';ind.style.display='block';}
    else{lb.style.color='#999';lb.style.fontWeight='500';ind.style.display='none';}
  });
  sec.querySelector('.econtent').innerHTML=ecHTML(eid);
}
function mkId(city){return 's_'+city.replace(/[^가-힣a-zA-Z0-9]/g,'_');}
function buildSection(d,isFirst){
  const id=mkId(d.city);
  const cl=d.cl.map((item,i)=>`<li><label class="clbl" for="c${id}${i}">
    <input type="checkbox" id="c${id}${i}" onchange="updPg('${id}',${d.cl.length})">
    <span class="cbox"><svg viewBox="0 0 12 10"><polyline points="1.5,5 4.5,8 10.5,1.5"/></svg></span>
    <span class="ctxt">${item}</span></label></li>`).join('');
  const spots=d.sp.map(s=>`<div class="spot"><div class="scat ${s.c}">${s.c==='lm'?'🏛 랜드마크':'🍽 맛집'}</div>
    <div class="sname">${s.n}</div><div class="sdesc">${s.d}</div></div>`).join('');
  const utags=d.up.map(u=>`<span class="utag">${u.n}</span>`).join('');
  const udets=d.up.map(u=>`<p><strong>${u.n}</strong> — ${u.i}</p>`).join('');
  const etabs=[{id:'acc',ic:'🚨',lb:'사고',c:'#FF3B30'},{id:'ri',ic:'🚗',lb:'대여 이슈',c:'#FF9500'},{id:'dl',ic:'⏰',lb:'픽업 지연',c:'#007AFF'}]
    .map(t=>`<button class="etab" data-id="${t.id}" onclick="switchEC('${id}','${t.id}')">
      <span class="etab-ic">${t.ic}</span><span class="etab-lb">${t.lb}</span>
      <div class="etab-in" style="background:${t.c};"></div></button>`).join('');
  const tip=d.tip?`<div class="eu-tip">💡 <strong>현지 꿀팁:</strong> ${d.tip}</div>`:'';
  return `<div class="csec${isFirst?' on':''}" id="${id}" data-city="${d.city}" data-co="${d.co}">
    <div class="chead"><h2>${d.flag} ${d.city}</h2><div class="sub">${d.co} · 인수 당일 가이드</div></div>
    <div class="sec"><div class="stitle"><span>✅</span> 차량 인수 체크리스트</div>
      <div class="card"><p style="margin-bottom:12px;font-weight:600;color:var(--dark);">하나라도 빼먹으면 반납 시 억울한 비용이 생길 수 있어요!</p>
        ${tip}<div class="pgwrap"><div class="pgtop"><span class="pglbl">완료 항목</span><span class="pgcnt" id="pc${id}">0 / ${d.cl.length}</span></div>
        <div class="pgbg"><div class="pgbar" id="pb${id}" style="width:0%"></div></div></div>
        <ul class="cl">${cl}</ul>
        <div class="done-badge" id="db${id}">✅ 모든 항목 완료! 안전한 드라이브 되세요 🚗</div>
        <div class="co co-w" style="margin-top:10px;"><strong>📸 가장 중요한 한 가지!</strong> 차량 인수 전 반드시 외관 360° 사진/영상을 촬영하세요.</div>
      </div></div>
    <div class="sec"><div class="stitle"><span>🛒</span> 현장에서 권유받을 수 있는 옵션들</div>
      <div class="card"><p style="margin-bottom:10px;color:var(--g6);">인수 시 직원이 아래 옵션을 추가로 권유할 수 있어요.</p>
        <div class="utags">${utags}</div><div class="udets" style="margin-top:12px;">${udets}</div>
        <div class="co co-t"><strong>💡 꿀팁:</strong> 유럽은 ZTL·혼잡통행료·고속도로 비네트 등 진입 제한이 많아요. GPS와 풀커버 보험은 거의 필수입니다.</div>
      </div></div>
    <div class="sec"><div class="stitle"><span>🗺️</span> ${d.city} 드라이브 스팟 & 맛집</div>
      <div class="card"><p style="margin-bottom:12px;color:var(--g6);">렌트카로 가기 좋은 핵심 스팟을 골랐어요.</p>
        <div class="sgrid">${spots}</div></div></div>
    <div class="divider"></div>
    <div class="ezone">
      <div class="ehd"><div class="edot"></div><span class="etxt">긴급 대응 가이드</span></div>
      <div class="etitle">여행 중 문제가 생겼나요?</div>
      <div class="esub">아래 케이스를 선택하면 대응 방법을 안내해드려요</div>
      <div class="etabs">${etabs}</div>
      <div class="econtent">${ecHTML('acc')}</div>
      <div class="bpad"></div>
    </div></div>`;
}
/* ── 초기화 ── */
const rgrow=document.getElementById('rgrow');
const pills=document.getElementById('pills');
const content=document.getElementById('content');
content.innerHTML=DATA.map((d,i)=>buildSection(d,i===0)).join('');
switchEC(mkId(DATA[0].city),'acc');
function renderCountryBtns(){
  rgrow.innerHTML=COUNTRIES.map(label=>{
    const co=label.replace(/^.+\s/,'');
    return `<button class="rgtag${co===activeCountry?' on':''}" onclick="selectCountry('${co}')">${label}</button>`;
  }).join('');
}
function renderPills(co){
  const cities=DATA.filter(d=>d.co===co);
  pills.innerHTML=cities.map(d=>`<button class="pill${d.city===activeCity&&d.co===co?' on':''}" onclick="showCity('${d.city}')">${d.city}</button>`).join('');
}
function selectCountry(co){
  activeCountry=co;
  renderCountryBtns();
  renderPills(co);
  const first=DATA.find(d=>d.co===co);
  if(first)showCity(first.city);
}
function showCity(city){
  activeCity=city;
  document.querySelectorAll('.csec').forEach(s=>s.classList.remove('on'));
  const id=mkId(city);
  const sec=document.getElementById(id);
  if(sec){sec.classList.add('on');if(!activeEC[id])switchEC(id,'acc');}
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.textContent===city));
  document.getElementById('si').value='';
  document.getElementById('nores').style.display='none';
}
function doFilter(v){
  const q=v.trim().toLowerCase();
  const nores=document.getElementById('nores');
  if(!q){nores.style.display='none';renderPills(activeCountry);showCity(DATA.find(d=>d.co===activeCountry)?.city||DATA[0].city);return;}
  const matches=DATA.filter(d=>d.city.toLowerCase().includes(q)||d.co.toLowerCase().includes(q));
  nores.style.display=matches.length?'none':'block';
  pills.innerHTML=matches.map(d=>`<button class="pill" onclick="showCity('${d.city}')">${d.flag} ${d.city}</button>`).join('');
  if(matches.length)showCity(matches[0].city);
}
function updPg(id,total){
  const sec=document.getElementById(id);if(!sec)return;
  const checked=sec.querySelectorAll('input[type=checkbox]:checked').length;
  document.getElementById('pc'+id).textContent=checked+' / '+total;
  document.getElementById('pb'+id).style.width=Math.round(checked/total*100)+'%';
  const db=document.getElementById('db'+id);if(db)db.classList.toggle('show',checked===total);
}
renderCountryBtns();renderPills(activeCountry);
</script>
</body>
</html>
